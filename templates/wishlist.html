{% extends "base.html" %}

{% block title %}Sách Yêu Thích - Thư Viện Sách{% endblock %}

{% block content %}
<section class="container py-5" style="min-height: 70vh;">
    <h4 class="fw-bold mb-4 text-orange">Sách Yêu Thích Của Tôi</h4>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
        <div class="col">
            <div class="book-card card border-0 shadow-sm p-2 h-100">
                <img src="https://images.unsplash.com/photo-1553729459-efe14ef6055d?w=400" class="card-img-top rounded"
                    alt="">
                <div class="card-body d-flex flex-column">
                    <h6 class="fw-bold mb-1">Tư Duy Lãnh Đạo</h6>
                    <p class="text-muted mb-1">Jay Shetty</p>
                    <p class="fw-semibold text-danger mb-3">150.000đ</p>
                    <div class="d-flex justify-content-between mt-auto">
                        <button class="btn btn-sm text-white" style="background-color:#ED553B;">Thêm vào giỏ</button>
                        <button class="btn btn-sm btn-outline-danger">Xóa</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="book-card card border-0 shadow-sm p-2 h-100">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400"
                    class="card-img-top rounded" alt="">
                <div class="card-body d-flex flex-column">
                    <h6 class="fw-bold mb-1">Thói Quen Nguyên Tử</h6>
                    <p class="text-muted mb-1">James Clear</p>
                    <p class="fw-semibold text-danger mb-3">165.000đ</p>
                    <div class="d-flex justify-content-between mt-auto">
                        <button class="btn btn-sm text-white" style="background-color:#ED553B;">Thêm vào giỏ</button>
                        <button class="btn btn-sm btn-outline-danger">Xóa</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
