<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store - Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar text-white py-2 px-3 d-flex justify-content-between align-items-center">
        <div>📞 +91 7397807795</div>
        <div>
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
            <a href="#"><i class="bi bi-linkedin"></i></a>
            <a href="#"><i class="bi bi-twitter"></i></a>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='images/sample logo 1.png') }}" width="40">
            </a>

            <!-- Search -->
            <form class="d-none d-md-flex me-auto ms-3">
                <input class="form-control" type="search" placeholder="Search Books">
                <button class="btn" type="submit">🔍</button>
            </form>

            <!-- Right menu -->
            <div class="d-flex align-items-center gap-3">
                <a href="{{ url_for('account') }}" class="nav-link">👤 Account</a>
                <a href="{{ url_for('view_cart') }}" class="nav-link">🛒 Cart</a>
                <a href="{{ url_for('wishlist') }}" class="nav-link">❤️ Wishlist</a>
            </div>

        </div>
    </nav>

    <!-- Menu -->
    <div class="border-top">
        <div class="container">
            <ul class="nav justify-content-center py-2">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('books') }}">Books</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">Contact</a></li>
            </ul>
        </div>
    </div>

    <!-- CART -->
    <section class="container py-5">
        <h4>My Cart</h4>

        <div class="row">

            <!-- LEFT -->
            <div class="col-lg-8">

                {% for item in items %}
                <div class="card mb-3 p-3 d-flex flex-row align-items-center">
                    <img src="{{ item.image }}" width="80" class="me-3">

                    <div class="flex-grow-1">
                        <h6>{{ item.title }}</h6>
                        <small>{{ item.publisher }}</small>
                        <p class="text-danger">{{ item.price }}đ</p>
                    </div>

                    <div>
                        <form action="{{ url_for('update_cart') }}" method="post" class="mb-2">
                            <input type="hidden" name="book_id" value="{{ item.id }}">
                            <input type="number" name="quantity" value="{{ item.quantity }}" min="1"
                                style="width:70px">
                            <button class="btn btn-sm btn-primary mt-1">Update</button>
                        </form>

                        <form action="{{ url_for('remove_from_cart', book_id=item.id) }}" method="post">
                            <button class="btn btn-sm btn-danger">Remove</button>
                        </form>
                    </div>
                </div>
                {% endfor %}

            </div>

            <!-- RIGHT -->
            <div class="col-lg-4">
                <div class="card p-3">
                    <h6>Order Summary</h6>

                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <span>{{ subtotal }}</span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Shipping</span>
                        <span>{{ shipping }}</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold">
                        <span>Total</span>
                        <span>{{ total }}</span>
                    </div>

                    <form action="{{ url_for('checkout') }}" method="post">
                        <button class="btn btn-success w-100 mt-3">Checkout</button>
                    </form>
                </div>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-5 bg-light">
        <div class="container text-center">
            <p>© 2025 Devomate</p>
        </div>
    </footer>

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
